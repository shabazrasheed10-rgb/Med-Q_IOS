<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Med-Q | Pro</title>
  <style>
    :root {
      --bg-color: #0c0d0e; 
      --card-bg: rgba(26, 28, 30, 0.7); 
      --accent-bbb: #38bdf8;
      --text-dim: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: #fff; margin: 0; padding: 15px; }
    
    /* Loading Screen to prevent flickering */
    #loading-screen {
      position: fixed; inset: 0; background: var(--bg-color); 
      display: flex; justify-content: center; align-items: center; z-index: 20000;
    }

    #auth-overlay { position: fixed; inset: 0; background: var(--bg-color); z-index: 10000; display: none; justify-content: center; align-items: center; }
    .system-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid var(--border-color); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; }
    
    input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); background: #000; color: #fff; outline: none; }
    button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--accent-bbb); font-weight: bold; cursor: pointer; margin-top: 10px; }
    .secondary-btn { background: transparent !important; color: var(--accent-bbb) !important; border: 1px solid var(--accent-bbb) !important; }
    
    #app-container { display: none; flex-direction: column; width: 100%; align-items: center; }
    .view { display: none; width: 100%; max-width: 800px; }
    .view.active { display: block; }

    .mcq-link.locked { opacity: 0.3; pointer-events: none; }
    .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin: 15px 0; display: inline-block; }
    .status-active { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .status-inactive { background: rgba(248, 113, 113, 0.2); color: #f87171; }

    .dynamic-island-wrapper { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; }
    .dynamic-island { background: #1c1e20; padding: 10px 25px; border-radius: 40px; display: flex; gap: 30px; border: 1px solid var(--border-color); }
    .island-item { color: var(--text-dim); cursor: pointer; }
    .island-item.active { color: var(--accent-bbb); }
  </style>
</head>
<body>

  <div id="loading-screen"><h3>Loading Med-Q...</h3></div>

  <div id="auth-overlay">
    <div class="system-card">
      <h2>Welcome</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="handleAuth()">Sign In</button>
      <button class="secondary-btn" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <div id="app-container">
    <div id="home-view" class="view active">
      <div class="system-card" style="max-width: 100%; margin-bottom: 20px;">
        <h3>Course Materials</h3>
        <div class="mcq-link locked" onclick="location.href='Anatomy.html'">Anatomy Theory</div>
        <div class="mcq-link locked" onclick="location.href='Physiology.html'">Physiology Theory</div>
      </div>
    </div>

    <div id="account-view" class="view">
      <div class="system-card" style="margin: 40px auto;">
        <h1>Profile</h1>
        <p id="user-display-email" style="color:var(--text-dim)"></p>
        <div id="act-status" class="status-badge status-inactive">Inactive</div>
        
        <div id="activation-area">
          <input type="text" id="activation-key" placeholder="Code">
          <button onclick="activateAccount()">Activate Now</button>
        </div>

        <button class="secondary-btn" onclick="handleSignOut()" style="color:#f87171!important; border-color:#f87171!important;">Sign Out</button>
      </div>
    </div>

    <div class="dynamic-island-wrapper">
      <nav class="dynamic-island">
        <div class="island-item active" id="nav-home" onclick="switchView('home')">Home</div>
        <div class="island-item" id="nav-account" onclick="switchView('account')">Profile</div>
      </nav>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJeuVjPYeVFY1-2eeKC3a9ztCMmRn9nyA",
    authDomain: "medo-a0b92.firebaseapp.com",
    projectId: "medo-a0b92",
    storageBucket: "medo-a0b92.firebasestorage.app",
    messagingSenderId: "895463604271",
    appId: "1:895463604271:web:f2300194e1019c283ac6da"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // --- AUTH OBSERVER (The Brain of the App) ---
  onAuthStateChanged(auth, async (user) => {
    const loading = document.getElementById('loading-screen');
    const authUI = document.getElementById('auth-overlay');
    const mainUI = document.getElementById('app-container');

    if (user) {
      document.getElementById('user-display-email').innerText = user.email;
      
      // Fetch user data from Firestore
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists() && userDoc.data().isPremium) {
        unlockContent();
      }

      authUI.style.display = 'none';
      mainUI.style.display = 'flex';
    } else {
      authUI.style.display = 'flex';
      mainUI.style.display = 'none';
    }
    loading.style.display = 'none'; // Hide loading once we know user state
  });

  window.handleAuth = async () => {
    try { await signInWithEmailAndPassword(auth, email.value, password.value); } 
    catch (e) { alert(e.message); }
  };

  window.handleRegister = async () => {
    try {
      const cred = await createUserWithEmailAndPassword(auth, email.value, password.value);
      await setDoc(doc(db, "users", cred.user.uid), { isPremium: false, email: email.value });
    } catch (e) { alert(e.message); }
  };

  window.handleSignOut = async () => {
    try { await signOut(auth); location.reload(); } 
    catch (e) { alert(e.message); }
  };

  window.activateAccount = async () => {
    const key = document.getElementById('activation-key').value;
    if (!key) return;
    try {
      const keyRef = doc(db, "license_keys", key);
      const snap = await getDoc(keyRef);
      if (snap.exists() && !snap.data().used) {
        await updateDoc(keyRef, { used: true, usedBy: auth.currentUser.uid });
        await setDoc(doc(db, "users", auth.currentUser.uid), { isPremium: true }, { merge: true });
        unlockContent();
        alert("Success! Content unlocked.");
      } else { alert("Invalid key"); }
    } catch (e) { alert(e.message); }
  };

  function unlockContent() {
    document.getElementById('act-status').innerText = "Premium Active";
    document.getElementById('act-status').className = "status-badge status-active";
    document.getElementById('activation-area').style.display = 'none'; // REMOVE BOX
    document.querySelectorAll('.mcq-link').forEach(l => l.classList.remove('locked'));
  }

  window.switchView = (v) => {
    document.querySelectorAll('.view, .island-item').forEach(el => el.classList.remove('active'));
    document.getElementById(v + '-view').classList.add('active');
    document.getElementById('nav-' + v).classList.add('active');
  };
</script>
</body>
</html>
