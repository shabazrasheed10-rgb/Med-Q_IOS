<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0c0d0e">
  <script src="https://unpkg.com/lucide@latest"></script>

  <title>Block 2 | Med-Q</title>
  <style>
    :root {
      --bg-color: #0c0d0e; 
      --card-bg: rgba(26, 28, 30, 0.7); 
      --header-bg: rgba(22, 24, 26, 0.85);
      --accent-hdsf: #f0cf6a;
      --accent-bbb: #38bdf8;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
      --transition: all 0.2s ease;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(circle at 50% 0%, #16181a 0%, #0c0d0e 100%);
      color: var(--text-main);
      margin: 0; padding: 15px;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; user-select: none; -webkit-user-select: none;
    }

    #auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); z-index: 10000;
      display: flex; justify-content: center; align-items: center;
    }
    
    .system-card {
      background: rgba(255, 255, 255, 0.04); 
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border-color);
      padding: 40px 30px; border-radius: 28px;
      width: 95%; max-width: 400px; 
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .system-card h2, .system-card h1 { margin-bottom: 20px; font-size: 1.6rem; color: #fff; }

    .system-card input {
      width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color);
      padding: 14px; border-radius: 14px; color: white; margin-bottom: 12px; 
      outline: none; transition: border 0.3s; text-align: center;
    }
    .system-card input:focus { border-color: var(--accent-bbb); }

    .system-card button {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: var(--accent-bbb); color: #000; font-weight: bold; 
      cursor: pointer; transition: transform 0.2s; font-size: 1rem; margin-bottom: 10px;
    }
    .system-card button:active { transform: scale(0.97); }

    .secondary-btn { background: transparent !important; color: var(--accent-bbb) !important; border: 1px solid var(--accent-bbb) !important; }
    .logout-btn { background: transparent !important; color: #ff5f5f !important; margin-top: 15px; font-size: 0.9rem !important; }

    .dynamic-island-wrapper {
      position: fixed; bottom: 30px; left: 0; right: 0;
      display: none; justify-content: center; z-index: 9999; pointer-events: none;
    }
    .dynamic-island {
      pointer-events: auto; background: rgba(28, 30, 32, 0.8);
      backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
      padding: 6px; border-radius: 40px; display: flex; align-items: center; gap: 5px;
    }
    .island-item {
      display: flex; align-items: center; gap: 8px; padding: 10px 20px;
      border-radius: 30px; color: #94a3b8; cursor: pointer; transition: 0.3s;
    }
    .island-item.active { background: rgba(56, 189, 248, 0.15); color: var(--accent-bbb); }

    #app-container { display: none; flex-direction: column; align-items: center; width: 100%; }
    .view { width: 100%; max-width: 900px; display: none; }
    .view.active { display: block; }
    
    /* RE-ADDED ORIGINAL STYLES */
    .main-header { width: 100%; background: var(--header-bg); padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    .year-nav { display: flex; gap: 4px; margin-bottom: 30px; }
    .year-chip { padding: 8px 16px; border-radius: 7px; color: var(--text-dim); cursor: pointer; }
    .year-chip.active { background: var(--card-bg); color: var(--accent-bbb); }
    .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .subject-card { background: var(--card-bg); border-radius: 14px; padding: 13px; border: 1px solid var(--border-color); }
    .mcq-link { color: var(--text-dim); display: flex; justify-content: space-between; padding: 12px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .mcq-link.locked { opacity: 0.3; pointer-events: none; }
    .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; }
    .status-active { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .status-inactive { background: rgba(239, 68, 68, 0.2); color: #f87171; }
  </style>
</head>
<body>

  <div id="auth-overlay">
    <div class="system-card">
      <h2>Med-Q Access</h2>
      <input type="email" id="email" placeholder="Email Address">
      <input type="password" id="password" placeholder="Password">
      <button onclick="handleAuth()">Sign In</button>
      <button class="secondary-btn" onclick="handleRegister()">Create Account</button>
    </div>
  </div>

  <div id="app-container">
    <div id="home-view" class="view active">
      <header class="main-header"><h3>Final & End-Rotation</h3><p>Block 2 • Stage 1</p></header>
      <div class="subject-grid">
         <div class="subject-card"><h1>Anatomy 🦴</h1>
            <span class="mcq-link locked" onclick="location.href='Anatomy.html'">Theory</span>
         </div>
      </div>
    </div>

    <div id="account-view" class="view">
      <div style="display:flex; justify-content:center; width:100%; margin-top:50px;">
        <div class="system-card">
          <h1>My Profile</h1>
          <p id="user-display-email" style="color:var(--text-dim);"></p>
          <div id="act-status" class="status-badge status-inactive">Status: Not Activated</div>
          <input type="text" id="activation-key" placeholder="Enter Activation Code">
          <button onclick="activateAccount()">Verify & Unlock</button>
          <button class="logout-btn" onclick="location.reload()">Sign Out</button>
        </div>
      </div>
    </div>

    <div class="dynamic-island-wrapper" id="island-wrap">
      <nav class="dynamic-island">
        <div class="island-item active" id="nav-home" onclick="switchView('home')"><i data-lucide="home"></i><span>Home</span></div>
        <div class="island-item" id="nav-account" onclick="switchView('account')"><i data-lucide="user"></i><span>Account</span></div>
      </nav>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJeuVjPYeVFY1-2eeKC3a9ztCMmRn9nyA",
    authDomain: "medo-a0b92.firebaseapp.com",
    projectId: "medo-a0b92",
    storageBucket: "medo-a0b92.firebasestorage.app",
    messagingSenderId: "895463604271",
    appId: "1:895463604271:web:f2300194e1019c283ac6da"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // --- REGISTRATION ---
  window.handleRegister = async function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return alert("Fill all fields");
    
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", cred.user.uid), { isPremium: false, email: email });
      alert("Account created! You can now Sign In.");
    } catch (e) { alert(e.message); }
  };

  // --- LOGIN ---
  window.handleAuth = async function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) { alert(e.message); }
  };

  // --- AUTO LOGIN CHECK ---
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('app-container').style.display = 'flex';
      document.getElementById('island-wrap').style.display = 'flex';
      document.getElementById('user-display-email').innerText = user.email;

      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists() && userDoc.data().isPremium) unlockContent();
      lucide.createIcons();
    }
  });

  // --- ACTIVATION ---
  window.activateAccount = async function() {
    const key = document.getElementById('activation-key').value;
    const user = auth.currentUser;
    if (!key || !user) return alert("Enter key");

    try {
      const keyRef = doc(db, "license_keys", key);
      const keySnap = await getDoc(keyRef);

      if (keySnap.exists() && !keySnap.data().used) {
        await updateDoc(keyRef, { used: true, usedBy: user.uid });
        await setDoc(doc(db, "users", user.uid), { isPremium: true }, { merge: true });
        unlockContent();
        alert("Activated!");
      } else { alert("Invalid or used code"); }
    } catch (e) { alert(e.message); }
  };

  function unlockContent() {
    document.getElementById('act-status').innerText = "Status: Activated";
    document.getElementById('act-status').className = "status-badge status-active";
    document.querySelectorAll('.mcq-link').forEach(l => l.classList.remove('locked'));
  }

  window.switchView = (v) => {
    document.querySelectorAll('.view, .island-item').forEach(el => el.classList.remove('active'));
    document.getElementById(v + '-view').classList.add('active');
    document.getElementById('nav-' + v).classList.add('active');
  };

  lucide.createIcons();
</script>
</body>
</html>
